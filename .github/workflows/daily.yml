name: Daily Market Podcast

on:
  schedule:
    # GitHub Actions cron is best-effort. Three slots stack for resilience:
    #
    # 1. Primary 21:15 UTC weekdays — main daily run after US close.
    # 2. Backup 22:30 UTC weekdays — runs only if 21:15 missed (mp3 guard).
    # 3. Pre-market 12:00 UTC weekdays (~7-8am ET) — express-only, covers
    #    overnight + Asia close + EU open + US futures.
    #
    # External scheduler (cron-job.org or similar) optionally triggers a
    # fourth dispatch via the workflow_dispatch API. The mp3-already-exists
    # guard in main.py makes all of these safe to fire redundantly.
    - cron: '15 21 * * 1-5'
    - cron: '30 22 * * 1-5'
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: "show, express, or both"
        required: false
        default: "both"
        type: choice
        options: [both, show, express]
      force:
        description: "Pass --force to regenerate even if today's mp3 exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-podcast
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Groq + ElevenLabs path is fast — typical run is ~3-5 min. The 20-min
    # ceiling catches anything pathological (network stalls, ElevenLabs API
    # outages dragging on retries, etc.) without burning a full hour.
    timeout-minutes: 20
    env:
      # LLM via Groq's OpenAI-compatible endpoint. Sub-second inference for
      # both passes; the local Ollama path is preserved in code for Mac dev
      # but isn't installed on this runner — Ollama on CPU-only ubuntu can't
      # finish the dialogue prompt within budget (proved across 2 runs).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: claude-haiku-4-5-20251001
      # Set ELEVENLABS_REMAINING_CHARS as a repo VARIABLE (not secret) and
      # update from elevenlabs.io/app/usage weekly. eleven_budget.py uses
      # this to size episodes accurately. Falls back to .meta.json estimate
      # when unset (will undercount by ~5-10k chars due to audio-tag billing).
      ELEVENLABS_REMAINING_CHARS: ${{ vars.ELEVENLABS_REMAINING_CHARS }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
      GROQ_CRITIC_MODEL: llama-3.1-8b-instant
      # TTS via ElevenLabs v3 text_to_dialogue API.
      TTS_BACKEND: eleven
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      # ntfy.sh push notifications. Set NTFY_TOPIC repo variable (or secret)
      # to a unique topic name; subscribe on phone via the ntfy app to get
      # success + failure pings. Without this, all CI failures are silent.
      NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}
      # FRED API key — used by civicledger for the economic calendar
      # (CPI/NFP/FOMC/GDP release dates). Free at fred.stlouisfed.org.
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests + count gate
        # Fail fast if test count drops below baseline. Count derives from
        # pytest's authoritative summary line ("N tests collected") rather
        # than greppable per-test output, so it survives pytest-version
        # format drift. Bump baseline when adding tests intentionally.
        run: |
          python -m pytest tests/ -q
          BASELINE=70
          COUNT=$(python -m pytest tests/ --collect-only -q 2>/dev/null \
                   | tail -n 5 \
                   | grep -oE '[0-9]+ tests? collected' \
                   | grep -oE '^[0-9]+' || echo 0)
          echo "test count: $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -lt "$BASELINE" ]; then
            echo "::error::test count $COUNT dropped below baseline $BASELINE"
            exit 1
          fi

      - name: Restore feed_health cache
        # .feed_health.json tracks per-feed fail streaks so chronically-down
        # RSS feeds get auto-skipped. Without this cache, each runner starts
        # with a fresh empty file and the auto-skip never activates in CI.
        uses: actions/cache@v4
        with:
          path: .feed_health.json
          key: feed-health-${{ github.run_id }}
          restore-keys: |
            feed-health-

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate episode
        # Pre-market 12:00 UTC slot runs express-only. All other triggers
        # run both formats. The mp3-exists guard prevents double-execution
        # within the same UTC day; pass force=true on workflow_dispatch to
        # bypass it (useful when validating a code change against today).
        run: |
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "12" ]; then
              MODE="express"
            else
              MODE="both"
            fi
          fi
          FORCE=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE="--force"
          fi
          echo "Running with mode=$MODE force=${FORCE:-no}"
          python main.py --$MODE $FORCE

      - name: Upload artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            run.log
          if-no-files-found: ignore

      - name: Notify on failure
        # Catch-all: if any earlier step crashed before main.py could ping
        # ntfy itself, send a workflow-level failure notification so the
        # silent-Friday gap can't repeat.
        if: failure()
        env:
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -fsS -X POST \
              -H "Title: ✗ workflow ${{ github.run_id }} failed" \
              -H "Priority: high" \
              -H "Tags: x,warning" \
              -d "Workflow: ${{ github.workflow }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "https://ntfy.sh/$NTFY_TOPIC" || true
          fi
