name: Daily Market Podcast

on:
  schedule:
    # GitHub Actions cron is best-effort. Documented behavior: schedules can
    # be delayed or skipped entirely during peak load. Two strategies stack
    # here for resilience:
    #
    # 1. Primary slot at 21:15 UTC (off the :30 peak, less queue contention).
    # 2. Backup slot at 22:30 UTC, one hour later. The concurrency group
    #    'daily-podcast' prevents double-execution: if the primary already
    #    succeeded, the backup queues briefly, sees an in-flight or recent
    #    run, and exits via the concurrency lock. If the primary skipped,
    #    the backup runs as the actual generation.
    #
    # External scheduler (cron-job.org or similar) optionally triggers a
    # third dispatch via the workflow_dispatch API — see README's
    # 'External cron fallback' section. Same concurrency lock applies.
    - cron: '15 21 * * 1-5'
    - cron: '30 22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-podcast
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Groq + ElevenLabs path is fast — typical run is ~3-5 min. The 20-min
    # ceiling catches anything pathological (network stalls, ElevenLabs API
    # outages dragging on retries, etc.) without burning a full hour.
    timeout-minutes: 20
    env:
      # LLM via Groq's OpenAI-compatible endpoint. Sub-second inference for
      # both passes; the local Ollama path is preserved in code for Mac dev
      # but isn't installed on this runner — Ollama on CPU-only ubuntu can't
      # finish the dialogue prompt within budget (proved across 2 runs).
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
      GROQ_CRITIC_MODEL: llama-3.1-8b-instant
      # TTS via ElevenLabs v3 text_to_dialogue API.
      TTS_BACKEND: eleven
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate episode
        run: python main.py

      - name: Upload artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            run.log
          if-no-files-found: ignore
