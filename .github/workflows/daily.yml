name: Daily Market Podcast

on:
  schedule:
    # 21:30 UTC weekdays (~5:30pm ET EDT / 4:30pm ET EST — safely after US close year-round)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-podcast
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OLLAMA_MODEL: qwen2.5:7b
      OLLAMA_URL: http://localhost:11434/api/generate
      OLLAMA_TIMEOUT: "1800"
      PIPER_VOICE: en_US-lessac-medium
      PIPER_VOICE_PATH: /home/runner/.local/share/piper-voices/en_US-lessac-medium.onnx

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama model blobs
        uses: actions/cache@v4
        with:
          path: /usr/share/ollama/.ollama/models
          key: ollama-${{ env.OLLAMA_MODEL }}-v1

      - name: Start Ollama
        run: |
          sudo systemctl enable --now ollama 2>/dev/null || \
            (nohup ollama serve > /tmp/ollama.log 2>&1 & disown)
          for i in {1..60}; do
            curl -sf http://localhost:11434/api/tags >/dev/null && break
            sleep 1
          done
          curl -sf http://localhost:11434/api/tags >/dev/null || (echo "ollama not up"; cat /tmp/ollama.log 2>/dev/null; exit 1)

      - name: Pull LLM model
        run: ollama pull "$OLLAMA_MODEL"

      - name: Cache Piper voice
        id: piper-cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.local/share/piper-voices
          key: piper-${{ env.PIPER_VOICE }}-v1

      - name: Download Piper voice
        if: steps.piper-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$(dirname "$PIPER_VOICE_PATH")"
          BASE="https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium"
          curl -sSL -o "$PIPER_VOICE_PATH" "$BASE/en_US-lessac-medium.onnx"
          curl -sSL -o "$PIPER_VOICE_PATH.json" "$BASE/en_US-lessac-medium.onnx.json"

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate episode
        run: python main.py

      - name: Upload artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            /tmp/ollama.log
            run.log
          if-no-files-found: ignore
