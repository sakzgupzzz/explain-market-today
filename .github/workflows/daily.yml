name: Daily Market Podcast

on:
  schedule:
    # GitHub Actions cron is best-effort. Three slots stack for resilience:
    #
    # 1. Primary 21:15 UTC weekdays — main daily run after US close.
    # 2. Backup 22:30 UTC weekdays — runs only if 21:15 missed (mp3 guard).
    # 3. Pre-market 12:00 UTC weekdays (~7-8am ET) — express-only, covers
    #    overnight + Asia close + EU open + US futures.
    #
    # External scheduler (cron-job.org or similar) optionally triggers a
    # fourth dispatch via the workflow_dispatch API. The mp3-already-exists
    # guard in main.py makes all of these safe to fire redundantly.
    - cron: '15 21 * * 1-5'
    - cron: '30 22 * * 1-5'
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: "show, express, or both"
        required: false
        default: "both"
        type: choice
        options: [both, show, express]

permissions:
  contents: write

concurrency:
  group: daily-podcast
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Groq + ElevenLabs path is fast — typical run is ~3-5 min. The 20-min
    # ceiling catches anything pathological (network stalls, ElevenLabs API
    # outages dragging on retries, etc.) without burning a full hour.
    timeout-minutes: 20
    env:
      # LLM via Groq's OpenAI-compatible endpoint. Sub-second inference for
      # both passes; the local Ollama path is preserved in code for Mac dev
      # but isn't installed on this runner — Ollama on CPU-only ubuntu can't
      # finish the dialogue prompt within budget (proved across 2 runs).
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
      GROQ_CRITIC_MODEL: llama-3.1-8b-instant
      # TTS via ElevenLabs v3 text_to_dialogue API.
      TTS_BACKEND: eleven
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate episode
        # Pre-market 12:00 UTC slot runs express-only. All other triggers
        # run both formats. The mp3-exists guard prevents double-execution
        # within the same UTC day.
        run: |
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "12" ]; then
              MODE="express"
            else
              MODE="both"
            fi
          fi
          echo "Running with mode=$MODE"
          python main.py --$MODE

      - name: Upload artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            run.log
          if-no-files-found: ignore
